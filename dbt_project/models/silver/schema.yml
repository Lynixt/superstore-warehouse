version: 2

models:
  - name: dim_customer
    description: "Customer dimension table. One row per unique customer."
    columns:
      - name: customer_id
        description: "Primary key. Unique customer identifier."
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Full name of the customer."
      - name: city
        description: "City where the customer is located."
      - name: country
        description: "Country of the customer."
      - name: segment
        description: "Customer segment: Consumer, Corporate, or Home Office."
        tests:
          - accepted_values:
              values: ["Consumer", "Corporate", "Home Office"]

  - name: dim_product
    description: "Product dimension table. One row per unique product."
    columns:
      - name: product_id
        description: "Primary key. Unique product identifier."
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Name of the product."
      - name: category
        description: "Product category: Furniture, Technology, or Office Supplies."
      - name: sub_category
        description: "Product sub-category."
      - name: unit_price
        description: "Standard unit price in IDR."
        tests:
          - not_null

  - name: dim_date
    description: "Date dimension table. One row per day from the earliest to latest order date."
    columns:
      - name: date_id
        description: "Primary key. The date."
        tests:
          - unique
          - not_null
      - name: year
        description: "Year of the date."
      - name: month
        description: "Month number (1-12)."
      - name: quarter
        description: "Quarter number (1-4)."
      - name: is_weekend
        description: "Boolean. TRUE if Saturday or Sunday."
