version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: superstore_postgres
    environment:
      POSTGRES_USER: dataengineer
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: superstore
    ports:
      - "5433:5432"
    volumes:
      - superstore_data:/var/lib/postgresql/data
      - ./sales_data.csv:/sales_data.csv

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: superstore_dbt
    volumes:
      - ./dbt_project:/usr/app
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  superstore_data:
